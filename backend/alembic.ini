[alembic]
# Path to migration scripts, relative to this file's location
script_location = alembic

# Template for generating migration file names
# %(year)d-%(month).2d-%(day).2d_%(rev)s_%(slug)s.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with the project root so `app` is importable
prepend_sys_path = .

# Timezone for auto-generated migration timestamps
timezone = UTC

# Truncate long messages in the output
truncate_slug_length = 40

# Do not set sqlalchemy.url here — it is injected dynamically in env.py
# from app.config.settings to keep secrets out of version control.

[post_write_hooks]
# Uncomment to auto-format generated migrations with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
